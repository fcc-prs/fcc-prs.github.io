name: get fcc pull requests
on:
  issues:
    types:
      - opened
      - reopened
      
jobs:
  update_prs:
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository to the runner
        uses: actions/checkout@v7
        with: 
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - name: rungh
        run: |
          gh api graphql -f query='query { organization(login: "key4hep") { repositories(first: 100) { nodes { name pullRequests(first: 30, states: OPEN) { nodes { number title author { login } createdAt updatedAt mergeable url } } } } } }'  > gh.json
        env:
          GH_TOKEN: ${{ secrets.FCC_GH_TOKEN }}
      - name: translategh
        run: ls; python3 reformulate_json.py; mv data.json sample.json; rm gh.json
      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v7
    
        

