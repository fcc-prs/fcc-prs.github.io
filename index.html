<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic JSON Table</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <h1>FCC Open Pull Request Summary</h1>
  </div>
  <div class="container">
    <h2>Active Repositories</h2>
    <div id="repo-table-container"></div>
  </div>
  <div class="container">
    <h2>Open Pull Requests</h2>
    <input type="text" id="myInput" onkeyup="searcher()" placeholder="Search..."> 
    <div id="table-container"></div>
  </div>    
  <script type="module" src="/assets/js/repo_script.js"></script>
  <script type="module" src="/assets/js/pr_script.js"></script> 
  <script src="/assets/js/searcher.js"></script> 
  <link href="https://cdn.jsdelivr.net/gh/tofsjonas/sortable@latest/dist/sortable.min.css" rel="stylesheet" /> 
  <script src="https://cdn.jsdelivr.net/gh/tofsjonas/sortable@latest/dist/sortable.min.js"></script>  
  </body>
</html>
